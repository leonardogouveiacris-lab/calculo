<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Relatório — Solicitações detalhadas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>

:root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-2: #fbfdff;
  --text: #121734;
  --muted: #667099;
  --line: #e7ecf5;
  --brand: #00C8F3;
  --brand-2: #0aa7ca;
  --accent-bg: #eaf9ff;
  --shadow-sm: 0 2px 10px rgba(14, 28, 54, .06);
  --shadow-md: 0 10px 30px rgba(14, 28, 54, .10);
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; }
html, body {
  background: var(--bg);
  color: var(--text);
  font: 14px/1.6 Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  margin: 0;
}
.wrap { max-width: 1120px; margin: 22px auto 64px; padding: 0 18px; }

/* Header */
.header {
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding: 18px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  text-align: center;
}
.brand {
  display:flex; align-items:center; gap:12px;
}
.brand img { height: 36px; width:auto; display:block; }
h1 {
  margin:0;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .2px;
}
.badges { display:flex; gap:8px; align-items:center; }
.badge {
  padding:6px 10px; border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--accent-bg);
  color: var(--text);
  font-weight: 700; font-size: 12px;
  white-space: nowrap;
}

/* Toolbar (centered card) */
.toolbar {
  display:flex; flex-wrap: wrap; gap: 8px; align-items:center; justify-content:center;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 10px;
  box-shadow: var(--shadow-md);
  margin: 12px 0 14px;
}
input[type="file"] { display:none; }

.label-file, .btn, .select {
  -webkit-appearance: none; appearance: none;
  border: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--text);
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-weight: 700; font-size: 13px;
  transition: .12s ease;
  box-shadow: var(--shadow-sm);
}
.label-file { cursor:pointer; }
.btn { cursor:pointer; }
.label-file:hover, .btn:hover, .select:hover {
  transform: translateY(-1px);
  border-color: #d7dfef;
  box-shadow: var(--shadow-md);
}
.btn:active, .label-file:active { transform: translateY(0); }

.btn.primary {
  background: linear-gradient(180deg, var(--brand) 0%, var(--brand-2) 100%);
  color: #fff; border-color: transparent;
}
.btn.ghost {
  background: #fff;
}

.select {
  padding-right: 28px;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted) 50%),
    linear-gradient(135deg, var(--muted) 50%, transparent 50%);
  background-position:
    calc(100% - 16px) calc(50% - 3px),
    calc(100% - 10px) calc(50% - 3px);
  background-size: 6px 6px;
  background-repeat: no-repeat;
}

/* Meta/KPIs */
.meta {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin: 6px 0 10px;
  color: var(--muted); font-size: 12px;
}
.kpis { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.kpi {
  background: var(--surface);
  border:1px solid var(--line);
  border-radius: 999px;
  padding:6px 10px; font-weight:800; color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* Table card */
.table-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.table-wrap { overflow:auto; }

/* Table */
.table { width:100%; border-collapse: collapse; font-size: 13px; min-width: 860px;}
.table thead th {
  text-align:left; padding: 10px 8px;
  border-bottom: 1px solid var(--line);
  color: var(--muted); font-weight: 800;
  background: #f9fbff;
  position: sticky; top: 0; z-index: 2;
  white-space: nowrap;
}
.table tbody td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.table tbody tr:nth-child(odd) td { background: #fcfdff; }
.table tbody tr:hover td { background: #f2f8ff; }
.right { text-align: right; white-space: nowrap; }

/* Dropdown (light) */
.dropdown { position: relative; display: inline-block; }
.dropdown-btn { cursor:pointer; user-select:none; min-width: 180px; }
.dropdown-panel {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  padding: 8px;
  width: 320px; max-height: 300px; overflow:auto;
  display:none; z-index: 9999;
}
.dropdown.open .dropdown-panel { display:block; }
.dropdown-search {
  width:100%;
  border:1px solid var(--line);
  border-radius: 8px;
  padding:6px 8px;
  font-size:12px;
  margin-bottom:6px;
}
.dropdown-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:6px 6px; border-radius:8px; font-size:12px;
}
.dropdown-item:hover { background: #f6f9ff; }
.dropdown-item input { margin-top:2px; }
.dropdown-actions {
  display:flex; gap:6px; padding-top:6px;
  border-top:1px dashed var(--line); margin-top:6px;
}
.dropdown-actions button {
  font-size:12px; padding:6px 8px; border-radius:8px;
  border:1px solid var(--line); background:#fff; cursor:pointer; font-weight:800;
}

/* Responsive */
@media (max-width: 720px) {
  .header { flex-direction: column; }
  .meta { flex-direction: column; align-items:flex-start; }
  .table { min-width: 720px; }
}

/* Print */
@media print {
  .toolbar, #fileName, .dropdown-panel { display:none !important; }
  body { background:#fff; }
  .wrap { margin:0; padding:0; }
  .header, .table-card { border:none; box-shadow:none; }
  .table thead th { position: static; }
}

</style>
</head>

<script>
/* ====== DADOS INICIAIS (mantenha os seus aqui) ====== */
const initialData = [
  {"Entrega em": "30/09/2025", "Contato: Primeiro nome": "Nogueira, Haret, Melo E Maroli (Nhm)", "Numero do Processo": "1000370-69.2025.5.02.0271", "Reclamante": "CLEBER RAMIRES DA SILVA", "Reclamada": "RECON PRODUTORA E EVENTOS LTDA", "Serviços": "Atualização de Cálculo.", "Total (Total)": "R$ 75,00"}
];
const initialClients = ["(Todos)", "Jofege Pavimentacao e Construcao Ltda", "Nogueira, Haret, Melo E Maroli (Nhm)", "Thiago Coriolano"];

const COLS = [
  { key: "Entrega em", label: "Entrega em" },
  { key: "Contato: Primeiro nome", label: "Cliente" },
  { key: "Numero do Processo", label: "Processo" },
  { key: "Reclamante", label: "Reclamante" },
  { key: "Reclamada", label: "Reclamada" },
  { key: "Serviços", label: "Serviço" },
  { key: "Total (Total)", label: "Total" },
];

let allRows = [...initialData];
let currentRows = [...initialData];
let currentClient = "(Todos)";

/* ====== UTILITÁRIOS ====== */
function setClientsSelect(names) {
  const select = document.getElementById("clientFilter");
  const opts = ["(Todos)", ...names.filter(x=>x && x !== "(Todos)")];
  select.innerHTML = opts.map(n => `<option value="${n}">${n}</option>`).join("");
  select.value = "(Todos)";
}

function parseDateBr(s) {
  const m = String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  const [_, dd, mm, yyyy] = m;
  return new Date(Number(yyyy), Number(mm)-1, Number(dd));
}
function toMonthKey(dateObj) {
  if (!dateObj) return null;
  return `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}`;
}
function monthKeyToLabel(key) {
  const [y,m] = key.split("-");
  const d = new Date(Number(y), Number(m)-1, 1);
  const label = d.toLocaleString("pt-BR", { month: "long", year: "numeric" });
  return label.charAt(0).toUpperCase()+label.slice(1);
}
function formatCurrencyBRL(v) {
  const num = Number(String(v).replace(/[^0-9,.-]/g, '').replace('.', '').replace(',', '.'));
  if (isNaN(num)) return v;
  return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function parseCurrencyBRL(str) {
  const s = String(str).replace(/[^0-9,.-]/g,'').replace(/\./g,'').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function toDDMMYYYYUTC(dateObj) {
  const dd = String(dateObj.getUTCDate()).padStart(2, '0');
  const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
  const yyyy = dateObj.getUTCFullYear();
  return `${dd}/${mm}/${yyyy}`;
}
function excelSerialToDateStr(serial) {
  if (serial === null || serial === undefined || serial === "") return "";
  const n = Number(serial);
  if (!isFinite(n)) return "";
  const epochUTC = Date.UTC(1899, 11, 30);
  const ms = epochUTC + Math.round(n) * 86400000;
  return toDDMMYYYYUTC(new Date(ms));
}
function normalizeDateAny(v) {
  if (!v) return "";
  if (v instanceof Date && !isNaN(v)) {
    const dUTC = new Date(Date.UTC(v.getFullYear(), v.getMonth(), v.getDate()));
    return toDDMMYYYYUTC(dUTC);
  }
  if (typeof v === "number") return excelSerialToDateStr(v);
  let s = String(v).trim();
  if (!s) return "";
  let m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return s;
  m = s.match(/^(\d{4})[-\/](\d{2})[-\/](\d{2})/);
  if (m) {
    const [_, yyyy, mm, dd] = m;
    return `${dd}/${mm}/${yyyy}`;
  }
  m = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (m) {
    const [_, dd, mm, yyyy] = m;
    return `${dd}/${mm}/${yyyy}`;
  }
  return s;
}

function normalizeAndFormat(data) {
  const map = {
    "Entrega em": ["Entrega em", "Data", "Data Entrega", "Entrega"],
    "Contato: Primeiro nome": ["Contato: Primeiro nome", "Cliente", "Contato"],
    "Numero do Processo": ["Numero do Processo", "Número do Processo", "Processo"],
    "Reclamante": ["Reclamante"],
    "Reclamada": ["Reclamada"],
    "Serviços": ["Serviços", "Servico", "Serviço"],
    "Total (Total)": ["Total (Total)", "Total", "Valor"]
  };

  function pick(row, keys) {
    for (const k of keys) {
      if (row.hasOwnProperty(k)) return row[k];
      const found = Object.keys(row).find(
        x => x.trim().toLowerCase() === String(k).trim().toLowerCase()
      );
      if (found) return row[found];
    }
    return "";
  }

  const rows = data.map(raw => {
    const dRaw = pick(raw, map["Entrega em"]);
    const d = normalizeDateAny(dRaw);

    let total = pick(raw, map["Total (Total)"]);
    total = formatCurrencyBRL(total);

    return {
      "Entrega em": d || "",
      "Contato: Primeiro nome": pick(raw, map["Contato: Primeiro nome"]) || "",
      "Numero do Processo": pick(raw, map["Numero do Processo"]) || "",
      "Reclamante": pick(raw, map["Reclamante"]) || "",
      "Reclamada": pick(raw, map["Reclamada"]) || "",
      "Serviços": pick(raw, map["Serviços"]) || "",
      "Total (Total)": total || ""
    };
  });

  rows.sort((a,b) => {
    const da = parseDateBr(a["Entrega em"]);
    const db = parseDateBr(b["Entrega em"]);
    if (da && db) return db - da;
    return 0;
  });

  return rows;
}

function updateCompetencia(rows) {
  const counts = {};
  for (const r of rows) {
    const d = parseDateBr(r["Entrega em"]);
    if (!d) continue;
    const k = toMonthKey(d);
    counts[k] = (counts[k] || 0) + 1;
  }
  const keys = Object.keys(counts);
  if (!keys.length) {
    document.getElementById("badgeCompetencia").textContent = "Competência: —";
    return "—";
  }
  keys.sort((a,b) => {
    const c = counts[b] - counts[a];
    if (c !== 0) return c;
    return a < b ? 1 : -1;
  });
  const label = monthKeyToLabel(keys[0]);
  document.getElementById("badgeCompetencia").textContent = "Competência: " + label;
  return label;
}

function updateMeta(rows) {
  document.getElementById("totalCount").textContent = `${rows.length} solicitações`;
  const soma = rows.reduce((acc, r) => acc + parseCurrencyBRL(r["Total (Total)"]), 0);
  document.getElementById("sumTotal").textContent =
    soma.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  updateCompetencia(rows);
}

function renderTable(rows) {
  const thead = document.getElementById("thead");
  const tbody = document.getElementById("tbody");
  thead.innerHTML = "<tr>" + COLS.map(c => `<th>${c.label}</th>`).join("") + "</tr>";
  tbody.innerHTML = rows.map(r => {
    return "<tr>" + COLS.map(c =>
      `<td ${c.label==="Total" ? 'class="right"':''}>${r[c.key] ?? ""}</td>`
    ).join("") + "</tr>";
  }).join("");
  updateMeta(rows);
}

/* ====== IMPORTAÇÃO + proteção ====== */
document.getElementById("fileInput").addEventListener("change", async (evt) => {
  try {
    const file = evt.target.files?.[0];
    if (!file) return;
    document.getElementById("fileName").textContent = file.name;

    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === "csv") {
      const text = await file.text();
      const rows = text.split(/\r?\n/).map(l => l.split(/,|;|\t/));
      const header = rows.shift().map(h => h.trim());
      const data = rows
        .filter(r => r.some(x => x && String(x).trim() !== ""))
        .map(r => {
          const obj = {};
          header.forEach((h,i) => obj[h] = r[i]);
          return obj;
        });
      afterImport(data);
    } else {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type: "array", raw: true, cellDates: false });
      const wsname = wb.SheetNames[0];
      const ws = wb.Sheets[wsname];
      const data = XLSX.utils.sheet_to_json(ws, { defval: "", raw: true });
      afterImport(data);
    }
  } catch (err) {
    console.error(err);
    alert("Erro ao importar o arquivo. Detalhes:\n" + (err?.message || err));
  }
});

function afterImport(data) {
  allRows = normalizeAndFormat(data);
  currentRows = [...allRows];
  renderTable(currentRows);

  const names = Array.from(new Set(allRows.map(r =>
    (r["Contato: Primeiro nome"]||"").trim()
  ))).filter(Boolean).sort();
  setClientsSelect(names);

  const recls = Array.from(new Set(allRows.map(r => (r["Reclamada"]||"").trim())))
    .filter(Boolean).sort();
  setReclamadaDropdown(recls);

  selectedReclamadas.clear();
  updateReclamadaBtnLabel();
}

/* ====== FILTROS COMBINADOS ====== */
let selectedReclamadas = new Set();

function applyFilters() {
  let rows = [...allRows];

  const clientVal = document.getElementById("clientFilter").value || "(Todos)";
  currentClient = clientVal;

  if (clientVal !== "(Todos)") {
    rows = rows.filter(r => String(r["Contato: Primeiro nome"]).trim() === clientVal);
  }
  if (selectedReclamadas.size > 0) {
    rows = rows.filter(r => selectedReclamadas.has(String(r["Reclamada"]).trim()));
  }

  currentRows = rows;
  renderTable(currentRows);
}

document.getElementById("clientFilter").addEventListener("change", applyFilters);

/* ====== DROPDOWN CHECKBOXES: RECLAMADA ====== */
const dd = document.getElementById("reclamadaDropdown");
const ddBtn = document.getElementById("reclamadaBtn");
const ddPanel = document.getElementById("reclamadaPanel");
const ddList = document.getElementById("reclamadaList");
const ddSearch = document.getElementById("reclamadaSearch");

ddBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  dd.classList.toggle("open");
  ddSearch.focus();
});

document.addEventListener("click", () => dd.classList.remove("open"));
ddPanel.addEventListener("click", (e) => e.stopPropagation());

function setReclamadaDropdown(reclamadas) {
  ddList.innerHTML = reclamadas.map((name, i) => {
    const id = "recl_" + i;
    return `
      <label class="dropdown-item" data-name="${name.toLowerCase()}">
        <input type="checkbox" id="${id}" value="${name}">
        <span>${name}</span>
      </label>
    `;
  }).join("");

  ddList.querySelectorAll('input[type="checkbox"]').forEach(chk => {
    chk.addEventListener("change", () => {
      if (chk.checked) selectedReclamadas.add(chk.value);
      else selectedReclamadas.delete(chk.value);
      updateReclamadaBtnLabel();
      applyFilters();
    });
  });
}

function updateReclamadaBtnLabel() {
  if (selectedReclamadas.size === 0) {
    ddBtn.textContent = "Reclamada: (Todas)";
  } else if (selectedReclamadas.size <= 2) {
    ddBtn.textContent = "Reclamada: " + Array.from(selectedReclamadas).join(", ");
  } else {
    ddBtn.textContent = `Reclamada: ${selectedReclamadas.size} selecionadas`;
  }
}

ddSearch.addEventListener("input", () => {
  const q = ddSearch.value.trim().toLowerCase();
  ddList.querySelectorAll(".dropdown-item").forEach(item => {
    const n = item.getAttribute("data-name");
    item.style.display = (!q || n.includes(q)) ? "" : "none";
  });
});

document.getElementById("reclamadaSelectAll").addEventListener("click", () => {
  ddList.querySelectorAll('input[type="checkbox"]').forEach(chk => {
    chk.checked = true;
    selectedReclamadas.add(chk.value);
  });
  updateReclamadaBtnLabel();
  applyFilters();
});

document.getElementById("reclamadaClearAll").addEventListener("click", () => {
  ddList.querySelectorAll('input[type="checkbox"]').forEach(chk => chk.checked = false);
  selectedReclamadas.clear();
  updateReclamadaBtnLabel();
  applyFilters();
});

/* ====== BOTÕES ====== */
document.getElementById("btnClear").addEventListener("click", () => {
  document.getElementById("clientFilter").value = "(Todos)";
  currentClient = "(Todos)";

  ddList.querySelectorAll('input[type="checkbox"]').forEach(chk => chk.checked = false);
  selectedReclamadas.clear();
  updateReclamadaBtnLabel();

  applyFilters();
});

function clearImportedData() {
  allRows = [];
  currentRows = [];
  currentClient = "(Todos)";

  setClientsSelect([]);
  const clientFilter = document.getElementById("clientFilter");
  if (clientFilter) clientFilter.value = "(Todos)";

  ddList.innerHTML = "";
  selectedReclamadas.clear();
  updateReclamadaBtnLabel();

  const fileNameEl = document.getElementById("fileName");
  if (fileNameEl) fileNameEl.textContent = "";

  const fileInput = document.getElementById("fileInput");
  if (fileInput) fileInput.value = "";

  const badgeComp = document.getElementById("badgeCompetencia");
  if (badgeComp) badgeComp.textContent = "Competência: —";

  renderTable(currentRows);
}

document.getElementById("clearDataBtn").addEventListener("click", clearImportedData);

document.getElementById("btnPrint").addEventListener("click", () => {
  const compText = document.getElementById("badgeCompetencia")
    .textContent.replace("Competência: ","").trim() || "—";
  const client = currentClient && currentClient !== "" ? currentClient : "(Todos)";
  const safe = (s) => s.replace(/[\\/:*?"<>|]/g, "-").replace(/\s+/g, " ").trim();
  const suggested = `Solicitações - ${compText} - ${client}`;
  const originalTitle = document.title;
  document.title = safe(suggested);
  window.print();
  setTimeout(() => { document.title = originalTitle; }, 500);
});

document.getElementById("btnExportXlsx").addEventListener("click", () => {
  const rowsToExport =
    (window.currentRows && Array.isArray(window.currentRows) && window.currentRows.length ? window.currentRows :
    (window.filteredRows && Array.isArray(window.filteredRows) && window.filteredRows.length ? window.filteredRows :
    (window.rows && Array.isArray(window.rows) ? window.rows : [])));

  if (!rowsToExport.length) {
    alert("Nenhum dado disponível para exportar.");
    return;
  }

  // Exporta exatamente as colunas visíveis no relatório
  const exportData = rowsToExport.map(r => ({
    "Entrega em": r["Entrega em"] ?? r["Entrega"] ?? r["Entrega_em"] ?? "",
    "Cliente": r["Cliente"] ?? "",
    "Número do Processo": r["Número do Processo"] ?? r["Processo"] ?? r["Numero do Processo"] ?? "",
    "Reclamante": r["Reclamante"] ?? "",
    "Reclamada": r["Reclamada"] ?? "",
    "Serviço": r["Serviço"] ?? r["Servico"] ?? "",
    "Total": r["Total"] ?? r["Valor"] ?? ""
  }));

  const worksheet = XLSX.utils.json_to_sheet(exportData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Relatório");

  const now = new Date();
  const fileName = `solicitacoes_${now.toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(workbook, fileName);
});


/* ====== render inicial ====== */
setClientsSelect(initialClients);
renderTable(initialData);

const initialRecls = Array.from(new Set(initialData.map(r => (r["Reclamada"]||"").trim())))
  .filter(Boolean).sort();
setReclamadaDropdown(initialRecls);
updateReclamadaBtnLabel();
</script>
</body>
</html>
